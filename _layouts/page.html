---
layout: default
---
<section class="page-hero">
  <div class="wrap">
    {% if page.eyebrow %}<p class="eyebrow">{{ page.eyebrow }}</p>{% endif %}
    <h1>{{ page.title }}</h1>
    {% if page.subtitle %}<p class="lede">{{ page.subtitle }}</p>{% endif %}
  </div>
</section>

<article class="page-body">
  <div class="wrap prose">
    {{ content }}
  </div>
</article>
